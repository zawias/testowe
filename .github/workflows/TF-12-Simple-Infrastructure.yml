            -e OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" \
            "${{ env.TEST_IMAGE }}"

      - name: Wait for API to be ready
        run: |
          echo "Czekam na start API..."
          sleep 10

      - name: Test /weather endpoint via curl
        run: |
          set -e
          echo "Testowanie endpointu /weather..."
          curl -f "http://localhost:8000/weather?city=Warsaw&api_key=${{ secrets.OPENWEATHER_API_KEY }}"
          echo
          echo "OK - endpoint /weather zwrócił odpowiedź 2xx."

      - name: Show container logs (for debug on failure)
        if: failure()
        run: |
          echo "Logi kontenera:"
          docker logs pogoda_api || true

      - name: Stop container
        if: always()
        run: |
          docker stop pogoda_api || true
          docker rm pogoda_api || true

  # =====================
  # 3. BUILD & PUSH JOB
  # =====================
  build-and-push-app-prod:
    runs-on: ubuntu-latest
    name: Build & Push App ${{ matrix.environment }}
    needs: test-app-prod
    #if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.destroy != 'true'
    if: ${{ inputs.destroy != 'true' }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-prod
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 CACHE
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-${{ hashFiles('cwiczenia/06-context/pogoda_python_flusk/Dockerfile', 'cwiczenia/06-context/pogoda_python_flusk/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          push: true
          tags: |
            ${{ env.HUB_IMAGE_BASE }}:ansible-${{ matrix.environment }}
            ${{ env.HUB_IMAGE_BASE }}:${{ github.sha }}

          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

  # =====================
  # 4. TERRAFORM DESTROY
  # =====================
  terrrform-destroy-prod:
    name: Terraform Destroy ${{ matrix.environment }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-prod
    defaults:
      run:
        working-directory: TERRAFORM/04
    if: ${{ inputs.destroy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
