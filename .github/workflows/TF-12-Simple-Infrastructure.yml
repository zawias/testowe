    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-prod
    defaults:
      run:
        working-directory: TERRAFORM/04
    needs: build-and-push-app-prod
    if: ${{ inputs.destroy != 'true' }}
