name: TF 12 - Simple Terraform Cloud Infrastructure

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure after creation'
        required: false
        default: 'false'

concurrency:
  group: terraform-infra
  cancel-in-progress: false

env:
  WORKDIR: ./cwiczenia/06-context/pogoda_python_flusk
  TEST_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda:test
  HUB_IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda

jobs:

  # =====================
  # 1. BUILD JOB
  # =====================
  build-app:
    runs-on: ubuntu-latest
    if: ${{ inputs.destroy != 'true' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-dev
          - environment: tf-stag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 CACHE
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-${{ hashFiles('cwiczenia/06-context/pogoda_python_flusk/Dockerfile', 'cwiczenia/06-context/pogoda_python_flusk/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-

      - name: Build local test image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          tags: ${{ env.TEST_IMAGE }}
          load: true
          push: false

          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Save image to tar
        run: |
          docker save "${{ env.TEST_IMAGE }}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pogoda-image-${{ matrix.environment }}
          path: cwiczenia/06-context/pogoda_python_flusk/image.tar

  # =====================
  # 2. TEST JOB
  # =====================
  test-app:
    runs-on: ubuntu-latest
    needs: build-app
    if: ${{ inputs.destroy != 'true' }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-dev
          - environment: tf-stag

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pogoda-image-${{ matrix.environment }}

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Run container
        run: |
          docker run -d \
            --name pogoda_api \
            -p 8000:8000 \
            -e OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" \
            "${{ env.TEST_IMAGE }}"

      - name: Wait for API to be ready
        run: |
          echo "Czekam na start API..."
          sleep 10

      - name: Test /weather endpoint via curl
        run: |
          set -e
          echo "Testowanie endpointu /weather..."
          curl -f "http://localhost:8000/weather?city=Warsaw&api_key=${{ secrets.OPENWEATHER_API_KEY }}"
          echo
          echo "OK - endpoint /weather zwrócił odpowiedź 2xx."

      - name: Show container logs (for debug on failure)
        if: failure()
        run: |
          echo "Logi kontenera:"
          docker logs pogoda_api || true

      - name: Stop container
        if: always()
        run: |
          docker stop pogoda_api || true
          docker rm pogoda_api || true

  # =====================
  # 3. BUILD & PUSH JOB
  # =====================
  build-and-push-app:
    runs-on: ubuntu-latest
    needs: test-app
    #if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.destroy != 'true'
    if: ${{ inputs.destroy != 'true' }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-dev
          - environment: tf-stag

    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 CACHE
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-${{ hashFiles('cwiczenia/06-context/pogoda_python_flusk/Dockerfile', 'cwiczenia/06-context/pogoda_python_flusk/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          push: true
          tags: |
            ${{ env.HUB_IMAGE_BASE }}:ansible-${{ matrix.environment }}
            ${{ env.HUB_IMAGE_BASE }}:${{ github.sha }}

          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

  # =====================
  # 4. TERRAFORM DESTROY
  # =====================
  terrrform-destroy:
    name: Terraform Destroy
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-dev
          - environment: tf-stag

    defaults:
      run:
        working-directory: TERRAFORM/04
    if: ${{ inputs.destroy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_CREDENTIALS }}

      - name: Write tfvars from secret
        shell: bash
        run: |
          cat <<EOF > terraform.auto.tfvars
          ${{ secrets.AUTO_TF_VARS }}
          EOF

      - name: Create backend ${{ matrix.environment }}
        shell: bash
        run: |
          cat <<-EOF > backend.tf
          terraform { 
            cloud { 
              
              organization = "piotr_koska_test" 

              workspaces { 
                name = "${{ matrix.environment }}" 
              } 
            } 
          }
          EOF

      - name: Terraform Init
        run: terraform init

      # PLAN DESTROY (żeby mieć coś do wizualizacji)
      - name: Terraform Destroy Plan
        run: terraform plan -destroy -out=tfplan -var-file=./variables/${{ matrix.environment }}.vars

      - name: Terraform show (destroy)
        run: terraform show -json tfplan > tfplan.json

      - name: Visualize Terraform destroy plan (HTML)
        run: |
          docker run \
            --user $(id -u):$(id -g) \
            -v $PWD:/workspace \
            -w /workspace \
            ghcr.io/dineshba/tf-summarize \
            -html -out report.html tfplan.json

          echo "<h2>Terraform Destroy Plan</h2>" >> $GITHUB_STEP_SUMMARY
          cat report.html >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file=./variables/${{ matrix.environment }}.vars 

  # =====================
  # 5. TERRAFORM APPLY
  # =====================
  terraform-all-in-one:
    name: Terraform All-in-One
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-dev
          - environment: tf-stag

    defaults:
      run:
        working-directory: TERRAFORM/04
    needs: build-and-push-app
    if: ${{ inputs.destroy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_CREDENTIALS }}

      - name: Write tfvars from secret
        shell: bash
        run: |
          cat <<EOF > terraform.auto.tfvars
          ${{ secrets.AUTO_TF_VARS }}
          EOF

      - name: Create backend ${{ matrix.environment }}
        shell: bash
        run: |
          cat <<-EOF > backend.tf
          terraform { 
            cloud { 
              
              organization = "piotr_koska_test" 

              workspaces { 
                name = "${{ matrix.environment }}" 
              } 
            } 
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan -var-file=./variables/${{ matrix.environment }}.vars

      - name: Install Docker
        uses: docker/setup-buildx-action@v4

      - name: Terraform show
        run: terraform show -json tfplan > tfplan.json

      - name: Visualize Terraform plan (HTML)
        id: visualize
        run: |
          docker run \
            --user $(id -u):$(id -g) \
            -v $PWD:/workspace \
            -w /workspace \
            ghcr.io/dineshba/tf-summarize \
            -html -out report.html tfplan.json

          echo "<h2>Terraform Plan</h2>" >> $GITHUB_STEP_SUMMARY
          cat report.html >> $GITHUB_STEP_SUMMARY

      - name: Copy artefacts html
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-report-${{ matrix.environment }}
          path: TERRAFORM/04/report.html

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Terraform Output
        run: terraform output

      - name: Need to wait for droplet to be fully ready before running Ansible
        run: |
          echo "Czekam 20 sekund na pełną gotowość dropleta..."
          sleep 20

      - name: Run Ansible playbook - install nginx
        run: ansible-playbook -i inventories/${{ matrix.environment }}/hosts.yaml install-nginx.yaml --limit ${{ vars.DROPLET_NAME }}

      - name: Run Ansible playbook - deploy app
        run: |
          ansible-galaxy collection install community.docker

          ansible-playbook \
            -i inventories/${{ matrix.environment }}/hosts.yaml \
            deploy-app.yml \
            --limit ${{ vars.DROPLET_NAME }} \
            -e "docker_image=${{ env.HUB_IMAGE_BASE }}:ansible-${{ matrix.environment }}" \
            -e "openweather_api_key=${{ secrets.OPENWEATHER_API_KEY }}"

  build-app-prod:
    name: Build App ${{ matrix.environment }}
    needs: [build-app, test-app, build-and-push-app, terraform-all-in-one]
    runs-on: ubuntu-latest
    if: ${{ inputs.destroy != 'true' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 CACHE
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-${{ hashFiles('cwiczenia/06-context/pogoda_python_flusk/Dockerfile', 'cwiczenia/06-context/pogoda_python_flusk/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.environment }}-docker-buildx-

      - name: Build local test image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          tags: ${{ env.TEST_IMAGE }}
          load: true
          push: false

          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Save image to tar
        run: |
          docker save "${{ env.TEST_IMAGE }}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pogoda-image-${{ matrix.environment }}
          path: cwiczenia/06-context/pogoda_python_flusk/image.tar

  # =====================
  # 2. TEST JOB
  # =====================
  test-app-prod:
    runs-on: ubuntu-latest
    name: Test App ${{ matrix.environment }}  
    needs: build-app-prod
    if: ${{ inputs.destroy != 'true' }}
    # Matrix po środowiskach + sekwencyjne uruchamianie i fail-fast
    environment: ${{ matrix.environment }}
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - environment: tf-prod

    steps:
      - name: Download image artifact
