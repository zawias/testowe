name: "04-01 – Using Actions"

on: 
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Dependencies
        run: npm ci
        working-directory: cwiczenia/04-using-actions/react-app

      - name: Run Unit Tests
        run: npm run test
        working-directory: cwiczenia/04-using-actions/react-app