name: 14 – Working with Artifacts

on:
  workflow_dispatch:

env:
  build-artifact-key: app-${{ github.sha }}
  test-coverage-key: test-coverage-${{ github.sha }}

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwiczenia/14-artifacts/react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Download cached dependencies
        id: cache
        uses: actions/cache@v3
        with:
          key: deps-node-modules-${{ hashFiles('cwiczenia/14-artifacts/react-app/package-lock.json') }}
          path: 14-artifacts/react-app/node_modules

      - name: Install dependencies (only on cache miss)
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Unit tests (with coverage)
        run: npm run test -- --coverage --watchAll=false

      - name: Upload test results (coverage)
        if: ${{ always() }} # wyślij nawet gdy testy padną, aby mieć artefakty do analizy
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.test-coverage-key }}
          path: cwiczenia/14-artifacts/react-app/coverage

      - name: Build code
        run: npm run build

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: 14-artifacts/react-app/build

  deploy:
    runs-on: ubuntu-latest
    needs: [test-build]

    steps:
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: build

      - name: Show folder structure
        run: ls -R