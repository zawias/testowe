name: TF 10 - Simple Terraform Cloud Infrastructure

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy infrastructure after creation'
        required: false
        default: 'false'

concurrency:
  group: terraform-infra
  cancel-in-progress: false

env:
  WORKDIR: ./cwiczenia/06-context/pogoda_python_flusk
  TEST_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda:test
  HUB_IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda


jobs:

  build-app:
    runs-on: ubuntu-latest
    if: ${{ inputs.destroy != 'true' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          tags: ${{ env.TEST_IMAGE }}
          load: true        # obraz załadowany do lokalnego dockera
          push: false

      - name: Save image to tar
        run: |
          docker save "${{ env.TEST_IMAGE }}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pogoda-image
          path: cwiczenia/06-context/pogoda_python_flusk/image.tar

  # =====================
  # 2. TEST JOB
  # =====================
  test-app:
    runs-on: ubuntu-latest
    needs: build-app
    if: ${{ inputs.destroy != 'true' }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: pogoda-image

      - name: Load Docker image
        run: |
          docker load -i image.tar

      - name: Run container
        run: |
          docker run -d \
            --name pogoda_api \
            -p 8000:8000 \
            -e OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" \
            "${{ env.TEST_IMAGE }}"

      - name: Wait for API to be ready
        run: |
          echo "Czekam na start API..."
          sleep 10

      - name: Test /weather endpoint via curl
        run: |
          set -e
          echo "Testowanie endpointu /weather..."
          curl -f "http://localhost:8000/weather?city=Warsaw&api_key=${{ secrets.OPENWEATHER_API_KEY }}"
          echo
          echo "OK - endpoint /weather zwrócił odpowiedź 2xx."

      - name: Show container logs (for debug on failure)
        if: failure()
        run: |
          echo "Logi kontenera:"
          docker logs pogoda_api || true

      - name: Stop container
        if: always()
        run: |
          docker stop pogoda_api || true
          docker rm pogoda_api || true

  # =====================
  # 3. BUILD & PUSH (RELEASE) JOB
  # =====================
  build-and-push-app:
    runs-on: ubuntu-latest
    needs: test-app
    #if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.destroy != 'true'
    if: ${{ inputs.destroy != 'true' }}
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          push: true
          tags: |
            ${{ env.HUB_IMAGE_BASE }}:ansible
            ${{ env.HUB_IMAGE_BASE }}:${{ github.sha }}

  terrrform-destroy:
    name: Terraform Destroy
    defaults:
      run:
        working-directory: TERRAFORM/03
    if: ${{ inputs.destroy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_CREDENTIALS }}

      - name: Write tfvars from secret
        shell: bash
        run: |
          cat <<EOF > terraform.auto.tfvars
          ${{ secrets.AUTO_TF_VARS }}
          EOF

      - name: Terraform Init
        run: terraform init

      # PLAN DESTROY (żeby mieć coś do wizualizacji)
      - name: Terraform Destroy Plan
        run: terraform plan -destroy -out=tfplan

      - name: Terraform show (destroy)
        run: terraform show -json tfplan > tfplan.json

      - name: Visualize Terraform destroy plan (HTML)
        run: |
          docker run \
            --user $(id -u):$(id -g) \
            -v $PWD:/workspace \
            -w /workspace \
            ghcr.io/dineshba/tf-summarize \
            -html -out report.html tfplan.json

          echo "<h2>Terraform Destroy Plan</h2>" >> $GITHUB_STEP_SUMMARY
          cat report.html >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

  terraform-all-in-one:
    name: Terraform All-in-One
    defaults:
      run:
        working-directory: TERRAFORM/03
    needs: build-and-push-app
    if: ${{ inputs.destroy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_CREDENTIALS }}

      - name: Write tfvars from secret
        shell: bash
        run: |
          cat <<EOF > terraform.auto.tfvars
          ${{ secrets.AUTO_TF_VARS }}
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Install Docker
        uses: docker/setup-buildx-action@v4

      - name: Terraform show
        id: show
        run: |
          terraform show -json tfplan > tfplan.json

      - name: Visualize Terraform plan (HTML)
        id: visualize
        run: |
          docker run \
            --user $(id -u):$(id -g) \
            -v $PWD:/workspace \
            -w /workspace \
            ghcr.io/dineshba/tf-summarize \
            -html -out report.html tfplan.json

          echo "<h2>Terraform Plan</h2>" >> $GITHUB_STEP_SUMMARY
          cat report.html >> $GITHUB_STEP_SUMMARY

      - name: Copy artefacts html
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-report
          path: TERRAFORM/03/report.html

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Terraform Output
        id: output
        run: |
          terraform output

      - name: Run Ansible playbook - install nginx
        run: ansible-playbook -i inventories/hosts.yaml install-nginx.yaml --limit marcin-zawiasa-github-actions-droplet

      - name: Run Ansible playbook - deploy app
        run: |
          ansible-galaxy collection install community.docker

          ansible-playbook \
            -i inventories/hosts.yaml \
            deploy-app.yml \
            --limit marcin-zawiasa-github-actions-droplet \
            -e "docker_image=${{ env.HUB_IMAGE_BASE }}:ansible" \
            -e "openweather_api_key=${{ secrets.OPENWEATHER_API_KEY }}"
